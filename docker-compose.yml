version: '3.8'

services:
  transvar-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transvar-api
    ports:
      - "8000:8000"
    environment:
      - TRANSVAR_DB_PATH=/data/transvar_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["python3", "server.py"]